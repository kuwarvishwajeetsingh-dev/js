<!DOCTYPE html>
<html lang='en'>
<head>
 <meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
 <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
<title>Document</title>
<style>
body{
    background:black;
    color:lime;
    font-family:monospace;
    padding:20px;
}

#terminal{
    font-size:30px;
}
span{
    animation: blink 1s infinite;
}

@keyframes blink{

    50%{
        opacity:0;
    }

}
.danger{

    color:red;

    font-size:40px;

    text-align:center;

    animation: dangerBlink 0.5s infinite;

}

@keyframes dangerBlink{

    50%{
        opacity:0;
    }

}

</style>

</head>
<body>
          <div id='terminal'></div> 
           <script>let messages = [
    "Initializing Hacking",
    "Reading your files",
    "Password files detected",
    "Sending all passwords and personal files to server",
    "Cleaning up"
];
function randomDelay(){

    return new Promise(resolve=>{

        let delay=Math.floor(Math.random()*7+1);

        setTimeout(()=>{
            resolve();
        },delay*1000);

    });

}
function addMessage(text){

    let div=document.createElement("div");

    div.innerHTML=text;

    document.getElementById("terminal")
    .append(div);

}
async function main(){

    for(let msg of messages){

        await randomDelay();

        addMessage(msg);}

    
let alert=document.createElement("h1");

    alert.innerText="⚠️ YOU ARE HACKED ⚠️";
    

    alert.classList.add("danger");

    document.getElementById("terminal")
    .append(alert);
    await randomDelay();
  let hack=document.createElement("h1");

    hack.innerText="⚠️ Game Over!! ⚠️";
    

    hack.classList.add("danger");

    document.getElementById("terminal")
    .append(hack); 
  

};

main();
function addMessage(text){

    let div=document.createElement("div");

    div.innerHTML=text+"<span>...</span>";

    document.getElementById("terminal")
    .append(div);

}
</script>
            
</body>
</html>
